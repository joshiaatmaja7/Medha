{% extends "base_app.html" %}

{% block content %}
  <div class="dashGrid">
    <section class="card span4" aria-label="Add idea">
      <div class="cardHeader">
        <h3>Add idea</h3>
        <span class="subtle">Build your map</span>
      </div>

      <form class="stack" method="POST" action="{{ url_for('mindmap.mindmap_add') }}">
        <label for="idea">Idea</label>
        <textarea id="idea" name="content" placeholder="e.g. Thesis, project concept, story arc…" required></textarea>
        <div class="btnRow">
          <button class="btn btnPrimary" type="submit">Add to map</button>
        </div>
      </form>

      <div class="emptyState">
        Tip: Use short phrases. The canvas will auto-layout nodes.
      </div>
    </section>

    <section class="card span8 mindmapCard" aria-label="Mind map canvas">
      <div class="cardHeader">
        <h3>Mind Map</h3>
        <span class="subtle">Drag ideas around. Lines connect them in sequence.</span>
      </div>

      <div class="mindmapCanvas" data-mindmap>
        <svg class="mindmapLines" data-mindmap-lines></svg>
        <div class="mindmapNodes" data-mindmap-nodes>
          {% for n in nodes %}
            <div
              class="mindNode"
              data-node
              data-id="{{ n.id }}"
              data-x="{{ n.x if n.x is not none else '' }}"
              data-y="{{ n.y if n.y is not none else '' }}"
            >
              <div class="mindNodeText">{{ n.content }}</div>
              <form method="POST" action="{{ url_for('mindmap.mindmap_delete', node_id=n.id) }}">
                <button class="mindNodeDel" type="submit" aria-label="Delete idea">×</button>
              </form>
            </div>
          {% endfor %}
        </div>
      </div>
    </section>
  </div>
{% endblock %}

{% block scripts %}
<style>
.mindmapCanvas {
  position: relative;
  width: 100%;
  height: 620px;
  border-radius: var(--radiusLg);
  overflow: hidden;
  border: 1px solid rgba(148,163,184,0.28);
  background:
    radial-gradient(900px 500px at 10% 0%, rgba(79,70,229,0.20), transparent 55%),
    radial-gradient(800px 480px at 90% 100%, rgba(14,165,233,0.18), transparent 55%),
    linear-gradient(135deg, rgba(15,23,42,0.95), rgba(15,23,42,0.88));
}

.mindmapLines {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
}

.mindmapLines line {
  stroke: rgba(148,163,184,0.55);
  stroke-width: 1.3;
}

.mindmapNodes {
  position: absolute;
  inset: 0;
}

.mindNode {
  position: absolute;
  background: rgba(15,23,42,0.94);
  padding: 10px 14px;
  border-radius: 999px;
  border: 1px solid rgba(148,163,184,0.6);
  box-shadow: 0 18px 40px rgba(15,23,42,0.85);
  cursor: grab;
  user-select: none;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  color: rgba(248,250,252,0.98);
  max-width: 260px;
}

.mindNodeText {
  font-size: 0.9rem;
  line-height: 1.35;
  white-space: normal;
}

.mindNode:active {
  cursor: grabbing;
  box-shadow: 0 26px 70px rgba(15,23,42,0.95);
}

.mindNodeDel {
  background: rgba(15,23,42,0.9);
  border-radius: 999px;
  border: 1px solid rgba(248,250,252,0.45);
  width: 22px;
  height: 22px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  color: rgba(248,250,252,0.9);
  font-size: 0.75rem;
  cursor: pointer;
}

.mindNodeDel:hover {
  background: rgba(248,250,252,0.92);
  color: #0f172a;
}
</style>
<script>
document.addEventListener("DOMContentLoaded", () => {
  const canvas = document.querySelector("[data-mindmap]");
  if (!canvas) return;

  const nodesContainer = canvas.querySelector("[data-mindmap-nodes]");
  const svg = canvas.querySelector("[data-mindmap-lines]");
  const nodes = Array.from(canvas.querySelectorAll("[data-node]"));

  const scatterNode = (node, index) => {
    const cols = 4;
    const spacingX = 220;
    const spacingY = 110;
    const col = index % cols;
    const row = Math.floor(index / cols);
    const x = 80 + col * spacingX;
    const y = 80 + row * spacingY;
    node.style.left = x + "px";
    node.style.top = y + "px";
    node.dataset.x = x;
    node.dataset.y = y;
  };

  const applyInitialLayout = () => {
    nodes.forEach((node, i) => {
      const dx = parseFloat(node.dataset.x);
      const dy = parseFloat(node.dataset.y);
      if (!Number.isNaN(dx) && !Number.isNaN(dy)) {
        node.style.left = dx + "px";
        node.style.top = dy + "px";
      } else {
        scatterNode(node, i);
      }
    });
  };

  const updateLines = () => {
    if (!svg) return;
    while (svg.firstChild) svg.removeChild(svg.firstChild);
    if (nodes.length < 2) return;

    const bbox = canvas.getBoundingClientRect();
    nodes.forEach((node, idx) => {
      if (idx === 0) return;
      const prev = nodes[idx - 1];
      const r1 = prev.getBoundingClientRect();
      const r2 = node.getBoundingClientRect();
      const x1 = r1.left + r1.width / 2 - bbox.left;
      const y1 = r1.top + r1.height / 2 - bbox.top;
      const x2 = r2.left + r2.width / 2 - bbox.left;
      const y2 = r2.top + r2.height / 2 - bbox.top;
      const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
      line.setAttribute("x1", x1);
      line.setAttribute("y1", y1);
      line.setAttribute("x2", x2);
      line.setAttribute("y2", y2);
      svg.appendChild(line);
    });
  };

  const persistPosition = (node) => {
    const id = node.dataset.id;
    const x = parseFloat(node.dataset.x || "0");
    const y = parseFloat(node.dataset.y || "0");
    if (!id) return;
    try {
      fetch(`/mindmap/pos/${id}`, {
        method: "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body: new URLSearchParams({ x: String(x), y: String(y) }),
      });
    } catch (_) {
      // non-fatal
    }
  };

  const attachDrag = (node) => {
    let isDragging = false;
    let startX = 0;
    let startY = 0;
    let initialX = 0;
    let initialY = 0;

    node.addEventListener("mousedown", (e) => {
      if (e.target.closest("button")) return;
      e.preventDefault();
      const rect = canvas.getBoundingClientRect();
      isDragging = true;
      startX = e.clientX;
      startY = e.clientY;
      initialX = parseFloat(node.style.left || "0");
      initialY = parseFloat(node.style.top || "0");
      node.style.zIndex = 100;
      canvas.classList.add("mindmapDragging");
    });

    window.addEventListener("mousemove", (e) => {
      if (!isDragging) return;
      const dx = e.clientX - startX;
      const dy = e.clientY - startY;
      const nx = initialX + dx;
      const ny = initialY + dy;
      node.style.left = nx + "px";
      node.style.top = ny + "px";
      node.dataset.x = nx;
      node.dataset.y = ny;
      updateLines();
    });

    window.addEventListener("mouseup", () => {
      if (!isDragging) return;
      isDragging = false;
      node.style.zIndex = "";
      canvas.classList.remove("mindmapDragging");
      persistPosition(node);
    });
  };

  applyInitialLayout();
  nodes.forEach(attachDrag);
  updateLines();

  window.addEventListener("resize", () => {
    updateLines();
  });
});
</script>
{% endblock %}
